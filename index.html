<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>えいごカードならべ</title>
<style>
*{box-sizing:border-box;}
body{margin:0;background:#f7f7f7;font-family:sans-serif;color:#111;}
.wrap{max-width:700px;margin:0 auto;padding:20px;}
.panel{background:#fff;border-radius:20px;padding:20px;box-shadow:0 6px 20px rgba(0,0,0,0.06);}
.title{text-align:center;margin-bottom:10px;font-weight:bold;}
.prompt{text-align:center;font-size:28px;font-weight:bold;margin:10px 0;}
.hint{text-align:center;color:#666;font-size:14px;margin-bottom:10px;}

.answer{min-height:100px;border:2px dashed #ccc;border-radius:16px;padding:10px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.cards{margin-top:15px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}

.card{padding:12px 16px;border:1px solid #ccc;border-radius:12px;font-size:22px;font-weight:bold;background:#fff;cursor:pointer;}
.card:active{transform:scale(0.95);}

.feedback{margin-top:15px;text-align:center;font-size:16px;}

body.shake{animation:shake .3s;}
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-8px);}
50%{transform:translateX(8px);}
75%{transform:translateX(-6px);}
100%{transform:translateX(0);}
}
</style>
</head>
<body>
<div class="wrap">
<div class="panel">

<div class="title">えいごカードならべ</div>

<div id="jp" class="prompt"></div>
<div class="hint">Spaceで音声 / Enterで判定</div>

<div id="answer" class="answer"></div>
<div id="cards" class="cards"></div>

<div id="feedback" class="feedback"></div>

</div>
</div>

<script>
const problems = [
{jp:"これは わたしの くるまです。",en:["this","is","my","car"]},
{jp:"これは わたしの かばんです。",en:["this","is","my","bag"]},
{jp:"これは わたしの ほんです。",en:["this","is","my","book"]},
{jp:"これは わたしの いぬです。",en:["this","is","my","dog"]}
];

let index=0;
let hand=[];
let placed=[];
let locked=false;

const jpEl=document.getElementById("jp");
const answerEl=document.getElementById("answer");
const cardsEl=document.getElementById("cards");
const feedbackEl=document.getElementById("feedback");

function shuffle(a){
return [...a].sort(()=>Math.random()-0.5);
}

function speak(){
if(!speechSynthesis)return;
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(problems[index].en.join(" "));
u.lang="en-US";
speechSynthesis.speak(u);
}

function load(){
locked=false;
placed=[];
hand=shuffle(problems[index].en);
jpEl.textContent=problems[index].jp;
render();
setTimeout(speak,200);
}

function render(){
answerEl.innerHTML="";
cardsEl.innerHTML="";

placed.forEach((w,i)=>{
let b=document.createElement("div");
b.className="card";
b.textContent=w;
b.onclick=()=>{
if(locked)return;
hand.push(w);
placed.splice(i,1);
render();
};
answerEl.appendChild(b);
});

hand.forEach((w,i)=>{
let b=document.createElement("div");
b.className="card";
b.textContent=w;
b.onclick=()=>{
if(locked)return;
placed.push(w);
hand.splice(i,1);
render();
};
cardsEl.appendChild(b);
});
}

function check(){
if(locked)return;

let correct=problems[index].en.join(" ");
let now=placed.join(" ");

if(now===correct){
locked=true;
feedbackEl.textContent="正解";
setTimeout(()=>{
index++;
if(index>=problems.length){
feedbackEl.textContent="終了";
return;
}
load();
},600);
}else{
feedbackEl.textContent="不正解";
document.body.classList.remove("shake");
void document.body.offsetWidth;
document.body.classList.add("shake");
}
}

document.addEventListener("keydown",(e)=>{
if(e.code==="Space"){
e.preventDefault();
speak();
}
if(e.code==="Enter"){
check();
}
});

load();
</script>
</body>
</html>
